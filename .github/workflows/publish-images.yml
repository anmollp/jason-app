name: Publish Container Images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Container image tag to publish. Leave blank to use the short commit SHA."
        required: false
        default: ""

permissions:
  contents: read
  id-token: write

env:
  GAR_REGION: ${{ vars.GCP_REGION || 'us-central1' }}
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY || 'jason-dev-containers' }}

jobs:
  publish:
    name: Build and push images
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate workflow configuration
        run: |
          if [ -z "${{ vars.GCP_PROJECT_ID }}" ]; then
            echo "::error::Set the GCP_PROJECT_ID repository variable."
            exit 1
          fi
          if [ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "::error::Set the GCP_WORKLOAD_IDENTITY_PROVIDER repository secret."
            exit 1
          fi
          if [ -z "${{ secrets.GCP_PUBLISHER_SERVICE_ACCOUNT }}" ]; then
            echo "::error::Set the GCP_PUBLISHER_SERVICE_ACCOUNT repository secret."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_PUBLISHER_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth
        run: gcloud auth configure-docker "${GAR_REGION}-docker.pkg.dev" --quiet

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve image tag
        run: |
          image_tag="${{ inputs.image_tag }}"
          if [ -z "$image_tag" ]; then
            image_tag="${GITHUB_SHA::7}"
          fi

          echo "IMAGE_TAG=${image_tag}" >> "$GITHUB_ENV"
          echo "Resolved image tag: ${image_tag}"

      - name: Set image names
        run: |
          echo "FRONTEND_IMAGE=${GAR_REGION}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${GAR_REPOSITORY}/frontend:${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=${GAR_REGION}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${GAR_REPOSITORY}/backend:${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}

      - name: Print Terraform image variables
        run: |
          echo "frontend_image = \"${FRONTEND_IMAGE}\""
          echo "backend_image  = \"${BACKEND_IMAGE}\""
          echo
          echo "Use image_tag=${IMAGE_TAG} with the Terraform Plan and Deploy workflows."
