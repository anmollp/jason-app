name: Terraform Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Terraform environment to deploy."
        required: true
        default: "dev"
        type: choice
        options:
          - dev
      image_tag:
        description: "Container image tag to deploy. Leave blank to use the short commit SHA."
        required: false
        default: ""

permissions:
  contents: read
  id-token: write
  issues: write

env:
  GAR_REPOSITORY: ${{ vars.GAR_REPOSITORY || 'jason-dev-containers' }}
  GOOGLE_CLOUD_QUOTA_PROJECT: ${{ vars.GCP_PROJECT_ID }}
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_WORKING_DIR: terraform/environments/${{ inputs.environment }}

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.resolve_image_tag.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate workflow configuration
        run: |
          if [ -z "${{ vars.GCP_PROJECT_ID }}" ]; then
            echo "::error::Set the GCP_PROJECT_ID repository variable."
            exit 1
          fi
          if [ -z "${{ vars.GCP_REGION }}" ]; then
            echo "::error::Set the GCP_REGION repository variable."
            exit 1
          fi
          if [ -z "${{ vars.GCS_STATE_BUCKET }}" ]; then
            echo "::error::Set the GCS_STATE_BUCKET repository variable."
            exit 1
          fi
          if [ -z "${{ vars.GAR_REPOSITORY }}" ]; then
            echo "::error::Set the GAR_REPOSITORY repository variable."
            exit 1
          fi
          if [ -z "${{ vars.BILLING_ACCOUNT_ID }}" ]; then
            echo "::error::Set the BILLING_ACCOUNT_ID repository variable."
            exit 1
          fi
          if [ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "::error::Set the GCP_WORKLOAD_IDENTITY_PROVIDER repository secret."
            exit 1
          fi
          if [ -z "${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}" ]; then
            echo "::error::Set the GCP_TERRAFORM_SERVICE_ACCOUNT repository secret."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve image tag
        id: resolve_image_tag
        run: |
          image_tag="${{ inputs.image_tag }}"
          if [ -z "$image_tag" ]; then
            image_tag="${GITHUB_SHA::7}"
          fi

          echo "IMAGE_TAG=${image_tag}" >> "$GITHUB_ENV"
          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "Resolved image tag: ${image_tag}"

      - name: Set Terraform image variables
        run: |
          echo "FRONTEND_IMAGE=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${GAR_REPOSITORY}/frontend:${IMAGE_TAG}" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${GAR_REPOSITORY}/backend:${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Verify container images exist
        run: |
          missing=0
          for image in "${FRONTEND_IMAGE}" "${BACKEND_IMAGE}"; do
            digest=$(gcloud artifacts docker images describe "${image}" --format='value(image_summary.fully_qualified_digest)' 2>/dev/null || true)
            if [ -n "$digest" ]; then
              echo "Found container image: ${digest}"
            else
              echo "::error::Container image not found: ${image}"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "::error::Publish both images with image_tag=${IMAGE_TAG} before running Terraform."
            exit 1
          fi

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8"

      - name: Terraform fmt check
        run: terraform fmt -check -recursive terraform

      - name: Configure Terraform backend
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          printf 'terraform {\n  backend "gcs" {\n    bucket = "%s"\n    prefix = "jason/%s"\n  }\n}\n' "${{ vars.GCS_STATE_BUCKET }}" "${{ inputs.environment }}" > backend.tf

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform plan \
            -var="project_id=${{ vars.GCP_PROJECT_ID }}" \
            -var="region=${{ vars.GCP_REGION }}" \
            -var="frontend_image=${FRONTEND_IMAGE}" \
            -var="backend_image=${BACKEND_IMAGE}" \
            -var="github_repository=${{ github.repository }}" \
            -var="github_ref=refs/heads/${{ github.ref_name }}" \
            -var="frontend_custom_domain=${{ vars.FRONTEND_CUSTOM_DOMAIN }}" \
            -var="billing_account_id=${{ vars.BILLING_ACCOUNT_ID }}" \
            -out=tfplan

      - name: Upload Terraform plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-${{ inputs.environment }}-plan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          if-no-files-found: error
          retention-days: 1

  approval:
    name: Approval
    runs-on: ubuntu-latest
    needs: plan
    outputs:
      issue_number: ${{ steps.approval_issue.outputs.issue_number }}
      issue_url: ${{ steps.approval_issue.outputs.issue_url }}

    steps:
      - name: Request deployment approval
        id: approval_issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > approval-body.md <<'EOF'
          Terraform plan completed for `${{ inputs.environment }}` using image tag `${{ needs.plan.outputs.image_tag }}`.

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Branch: `${{ github.ref_name }}`

          Comment `yes`, `lgtm`, `done`, `approve`, or `approved` to apply this plan.
          Comment `no`, `stop`, `deny`, `denied`, or `cancel` to stop this run.
          EOF

          issue_url=$(gh issue create \
            --repo "${{ github.repository }}" \
            --title "Approve Terraform deploy to ${{ inputs.environment }}: ${{ needs.plan.outputs.image_tag }}" \
            --body-file approval-body.md)
          issue_number="${issue_url##*/}"
          echo "issue_number=${issue_number}" >> "$GITHUB_OUTPUT"
          echo "issue_url=${issue_url}" >> "$GITHUB_OUTPUT"
          echo "Created approval issue: ${issue_url}"

      - name: Wait for deployment approval
        id: approval_decision
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ steps.approval_issue.outputs.issue_number }}
        run: |
          approve_pattern='^(yes|y|lgtm|done|approve|approved)$'
          deny_pattern='^(no|n|stop|deny|denied|cancel)$'

          for attempt in $(seq 1 60); do
            comments=$(gh api "repos/${{ github.repository }}/issues/${ISSUE_NUMBER}/comments" --jq '.[].body')
            decision=$(printf '%s\n' "$comments" | tr '[:upper:]' '[:lower:]' | sed 's/^[[:space:]]*//; s/[[:space:]]*$//' | awk -v approve="$approve_pattern" -v deny="$deny_pattern" '
              {
                token=$1
                gsub(/[^a-z]/, "", token)
              }
              token ~ approve { decision="approved" }
              token ~ deny { decision="denied" }
              END { print decision }
            ')

            if [ "$decision" = "approved" ]; then
              echo "Terraform deploy approved."
              exit 0
            fi
            if [ "$decision" = "denied" ]; then
              gh issue close "${ISSUE_NUMBER}" \
                --repo "${{ github.repository }}" \
                --comment "Terraform deploy denied."
              echo "::error::Terraform deploy denied in approval issue."
              exit 1
            fi

            echo "Waiting for approval comment on issue #${ISSUE_NUMBER} (${attempt}/60)."
            sleep 60
          done

          gh issue close "${ISSUE_NUMBER}" \
            --repo "${{ github.repository }}" \
            --comment "Terraform deploy approval timed out."
          echo "::error::Timed out waiting for Terraform deploy approval."
          exit 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs:
      - plan
      - approval
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate workflow configuration
        run: |
          if [ -z "${{ vars.GCP_PROJECT_ID }}" ]; then
            echo "::error::Set the GCP_PROJECT_ID repository variable."
            exit 1
          fi
          if [ -z "${{ vars.GCP_REGION }}" ]; then
            echo "::error::Set the GCP_REGION repository variable."
            exit 1
          fi
          if [ -z "${{ vars.GCS_STATE_BUCKET }}" ]; then
            echo "::error::Set the GCS_STATE_BUCKET repository variable."
            exit 1
          fi
          if [ -z "${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}" ]; then
            echo "::error::Set the GCP_WORKLOAD_IDENTITY_PROVIDER repository secret."
            exit 1
          fi
          if [ -z "${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}" ]; then
            echo "::error::Set the GCP_TERRAFORM_SERVICE_ACCOUNT repository secret."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_TERRAFORM_SERVICE_ACCOUNT }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set Terraform image variables
        run: |
          echo "FRONTEND_IMAGE=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${GAR_REPOSITORY}/frontend:${{ needs.plan.outputs.image_tag }}" >> "$GITHUB_ENV"
          echo "BACKEND_IMAGE=${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${GAR_REPOSITORY}/backend:${{ needs.plan.outputs.image_tag }}" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.15.8"

      - name: Configure Terraform backend
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          printf 'terraform {\n  backend "gcs" {\n    bucket = "%s"\n    prefix = "jason/%s"\n  }\n}\n' "${{ vars.GCS_STATE_BUCKET }}" "${{ inputs.environment }}" > backend.tf

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Download Terraform plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-${{ inputs.environment }}-plan
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -auto-approve tfplan

      - name: Verify Cloud Run revisions
        run: |
          verify_service() {
            service_name="$1"
            expected_image="$2"

            latest_ready_revision=$(gcloud run services describe "${service_name}" \
              --region "${{ vars.GCP_REGION }}" \
              --project "${{ vars.GCP_PROJECT_ID }}" \
              --format='value(status.latestReadyRevisionName)')
            traffic_revision=$(gcloud run services describe "${service_name}" \
              --region "${{ vars.GCP_REGION }}" \
              --project "${{ vars.GCP_PROJECT_ID }}" \
              --format='value(status.traffic[0].revisionName)')
            actual_image=$(gcloud run services describe "${service_name}" \
              --region "${{ vars.GCP_REGION }}" \
              --project "${{ vars.GCP_PROJECT_ID }}" \
              --format='value(spec.template.spec.containers[0].image)')

            if [ -z "$latest_ready_revision" ]; then
              echo "::error::${service_name} does not have a ready revision."
              exit 1
            fi

            if [ "$traffic_revision" != "$latest_ready_revision" ]; then
              echo "::error::${service_name} traffic is on ${traffic_revision}, but latest ready revision is ${latest_ready_revision}."
              exit 1
            fi

            if [ "$actual_image" != "$expected_image" ]; then
              echo "::error::${service_name} is configured with ${actual_image}, expected ${expected_image}."
              exit 1
            fi

            echo "Verified ${service_name}: ${traffic_revision} serving ${actual_image}"
          }

          verify_service "jason-${{ inputs.environment }}-frontend" "${FRONTEND_IMAGE}"
          verify_service "jason-${{ inputs.environment }}-backend" "${BACKEND_IMAGE}"

      - name: Close approval issue
        if: always() && needs.approval.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue close "${{ needs.approval.outputs.issue_number }}" \
            --repo "${{ github.repository }}" \
            --comment "Terraform deploy workflow finished with status: ${{ job.status }}."
